<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenAPI to JSON Schema Generator</title>

        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        fontFamily: {
                            sans: [
                                "Inter",
                                "ui-sans-serif",
                                "system-ui",
                                "-apple-system",
                                "BlinkMacSystemFont",
                                "Segoe UI",
                                "Roboto",
                                "Helvetica Neue",
                                "Arial",
                                "Noto Sans",
                                "sans-serif",
                            ],
                        },
                    },
                },
            };
        </script>

        <script>
            (function () {
                const saved = localStorage.getItem("theme");
                if (
                    saved === "dark" ||
                    (!saved &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches)
                ) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>

        <script type="importmap">
            {
                "imports": {
                    "@apidevtools/swagger-parser": "https://esm.sh/@apidevtools/swagger-parser"
                }
            }
        </script>

        <style>
            body {
                transition:
                    background-color 0.25s,
                    color 0.25s;
            }

            .card {
                border-radius: 0.5rem;
            }

            .generated-schema {
                border-radius: 0.375rem;
                padding: 1rem;
                overflow-x: auto;
                white-space: pre-wrap;
                word-break: break-all;
            }

            .error-message {
                color: #e53e3e;
                font-weight: 500;
            }
        </style>
    </head>

    <body
        class="h-full font-sans antialiased bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100"
    >
        <div class="container mx-auto px-4 py-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-gray-100">
                    OpenAPI to JSON Schema Generator
                </h1>

                <button
                    id="themeToggle"
                    class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition"
                >
                    <!-- Sun icon (shown in dark mode) -->
                    <svg
                        id="themeToggleLightIcon"
                        class="hidden w-6 h-6 dark:block"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 4V2m0 20v-2m8-8h2M2 12h2m15.364 6.364l1.414 1.414M4.222 4.222l1.414
                1.414m12.728 0l1.414-1.414M4.222 19.778l1.414-1.414M16 12a4 4 0 11-8 0
                4 4 0 018 0z"
                        />
                    </svg>

                    <!-- Moon icon (shown in light mode) -->
                    <svg
                        id="themeToggleDarkIcon"
                        class="w-6 h-6 dark:hidden"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 12.79A9 9 0 1111.21 3
                7 7 0 0021 12.79z"
                        />
                    </svg>
                </button>
            </div>

            <div class="card p-6 mb-8 bg-white dark:bg-gray-800 shadow">
                <h2
                    class="text-2xl font-semibold text-gray-700 dark:text-gray-200"
                >
                    Upload OpenAPI Specification
                </h2>

                <p class="mb-4 text-sm text-gray-500 dark:text-gray-400">
                    This completely runs on your browser. No data is sent to any
                    external server.
                </p>

                <div class="flex items-center justify-center w-full">
                    <label
                        for="dropzone-file"
                        class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed rounded-lg cursor-pointer bg-gray-50 border-gray-300 hover:bg-gray-100 hover:border-gray-400 dark:bg-gray-700 dark:border-gray-600 dark:hover:bg-gray-600"
                    >
                        <div
                            class="flex flex-col items-center justify-center pt-5 pb-6"
                        >
                            <svg
                                class="w-10 h-10 mb-3 text-gray-400 dark:text-gray-300"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775
5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118
19.5H6.75z"
                                ></path>
                            </svg>

                            <p
                                class="mb-2 text-lg text-gray-500 dark:text-gray-300"
                            >
                                <span class="font-semibold"
                                    >Click to upload</span
                                >
                                or drag and drop
                            </p>

                            <p class="text-xs text-gray-500 dark:text-gray-400">
                                JSON or YAML OpenAPI Specification (v3.0, v3.1)
                            </p>
                        </div>

                        <input
                            id="dropzone-file"
                            type="file"
                            class="hidden"
                            accept=".json,.yaml,.yml"
                        />
                    </label>
                </div>

                <div
                    id="fileNameDisplay"
                    class="mt-4 text-sm text-gray-600 dark:text-gray-300 text-center"
                ></div>
                <div
                    id="errorMessage"
                    class="error-message text-center mt-4"
                ></div>
            </div>

            <div
                class="card p-6 mb-8 hidden bg-white dark:bg-gray-800 shadow"
                id="outputContainer"
            >
                <h2
                    class="text-2xl font-semibold text-gray-700 dark:text-gray-200 mb-4"
                >
                    Generated Schemas
                </h2>

                <div id="schemasOutput"></div>
            </div>
        </div>

        <script>
            const toggle = document.getElementById("themeToggle");

            toggle.addEventListener("click", () => {
                const html = document.documentElement;

                html.classList.toggle("dark");

                if (html.classList.contains("dark")) {
                    localStorage.setItem("theme", "dark");
                } else {
                    localStorage.setItem("theme", "light");
                }
            });
        </script>

        <script type="module">
            import { generateOpenApiSchemas } from "./generate-schemas.js";

            const dropzoneFile = document.getElementById("dropzone-file");
            const fileNameDisplay = document.getElementById("fileNameDisplay");
            const errorMessage = document.getElementById("errorMessage");
            const outputContainer = document.getElementById("outputContainer");
            const schemasOutput = document.getElementById("schemasOutput");

            let openAPISpec = null;

            dropzoneFile.addEventListener("change", async (event) => {
                const file = event.target.files[0];

                if (!file) {
                    fileNameDisplay.textContent = "";
                    errorMessage.textContent = "";
                    outputContainer.classList.add("hidden");
                    return;
                }

                fileNameDisplay.textContent = `Selected file: ${file.name}`;
                errorMessage.textContent = "";
                outputContainer.classList.add("hidden");
                schemasOutput.innerHTML = "";

                const reader = new FileReader();

                reader.onload = async (e) => {
                    const fileContent = e.target.result;

                    try {
                        openAPISpec = JSON.parse(fileContent);
                    } catch {
                        errorMessage.textContent =
                            "Error: Invalid JSON format.";
                        return;
                    }

                    if (openAPISpec) {
                        try {
                            const schemas = await generateOpenApiSchemas(openAPISpec);
                            displaySchemas(schemas);
                        } catch (error) {
                            errorMessage.textContent = `Error generating schemas: ${error.message}`;
                        }
                    }
                };

                reader.readAsText(file);
            });

            function displaySchemas(schemas) {
                if (Object.keys(schemas).length === 0) {
                    errorMessage.textContent = "No schemas generated.";
                    outputContainer.classList.add("hidden");
                    return;
                }

                outputContainer.classList.remove("hidden");
                schemasOutput.innerHTML = "";

                Object.entries(schemas).forEach(([fileName, schemaContent]) => {
                    const details = document.createElement("details");
                    details.className = "p-4 rounded-lg bg-gray-50 dark:bg-gray-700 mb-4";

                    const summary = document.createElement("summary");
                    summary.className = "text-lg font-semibold cursor-pointer";
                    summary.textContent = fileName;

                    const content = document.createElement("div");
                    content.className = "mt-4";

                    const pre = document.createElement("pre");
                    pre.className = "generated-schema text-sm bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700";
                    pre.textContent = JSON.stringify(schemaContent, null, 2);

                    const btn = document.createElement("button");
                    btn.className = "mt-4 w-full px-4 py-2 rounded-md text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700";
                    btn.textContent = "Download Schema";
                    btn.onclick = () => {
                        const blob = new Blob(
                            [JSON.stringify(schemaContent, null, 2)],
                            { type: "application/json" },
                        );
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    };

                    content.appendChild(pre);
                    content.appendChild(btn);

                    details.appendChild(summary);
                    details.appendChild(content);

                    schemasOutput.appendChild(details);
                });
            }
        </script>
    </body>
</html>
